// \u2500\u2500\u2500 SORT HELPER \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function wbsKey(code) { return code.split('.').map(x => parseInt(x)||0); }
function wbsCmp(a,b) {
  const pa=wbsKey(a), pb=wbsKey(b);
  for(let i=0;i<Math.max(pa.length,pb.length);i++) { const d=(pa[i]||0)-(pb[i]||0); if(d) return d; }
  return 0;
}

// \u2500\u2500\u2500 BUILD MODEL \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function buildModel() {
  const realCodes = new Set(NODE_INFO.real);
  const virtualLabels = NODE_INFO.virtual;
  const allCodes = new Set([...realCodes, ...Object.keys(virtualLabels)]);
  const docsMap = {};
  DATA.forEach((rec,idx) => {
    const wbs = rec['C\u00f3digo WBS'] || 'Sin WBS';
    if(!docsMap[wbs]) docsMap[wbs]=[];
    docsMap[wbs].push(idx);
  });
  const nodes = {};
  allCodes.forEach(code => {
    nodes[code] = {
      code, label: virtualLabels[code] || WBS_LABELS[code] || code,
      isVirtual: !realCodes.has(code), children: [], docs: docsMap[code]||[]
    };
  });
  function parentOf(code) {
    const parts = code.split('.');
    for(let i=parts.length-1;i>0;i--) { const c=parts.slice(0,i).join('.'); if(nodes[c]) return c; }
    return null;
  }
  const roots = [];
  [...allCodes].forEach(code => { const par=parentOf(code); if(par) nodes[par].children.push(code); else roots.push(code); });
  Object.values(nodes).forEach(n => n.children.sort(wbsCmp));
  roots.sort(wbsCmp);
  return {nodes, roots};
}
const {nodes, roots} = buildModel();

// \u2500\u2500\u2500 ICONS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function folderSVG(isVirtual) {
  const f=isVirtual?'#c8d8f0':'#f5c542', s=isVirtual?'#8aaad0':'#d4a017';
  return `<svg class="node-icon" viewBox="0 0 20 16" fill="none"><path d="M1 3a1 1 0 011-1h5.382a1 1 0 01.894.553L9 4h9a1 1 0 011 1v9a1 1 0 01-1 1H2a1 1 0 01-1-1V3z" fill="${f}" stroke="${s}" stroke-width="0.8"/></svg>`;
}
function docSVG() {
  return `<svg class="doc-icon" viewBox="0 0 14 17" fill="none"><path d="M2 0.5h7.5L13 4v12H2V0.5z" fill="white" stroke="#ccc" stroke-width="0.8"/><path d="M9.5 0.5V4H13" stroke="#ccc" stroke-width="0.8"/><rect x="3.5" y="6" width="7" height="1.1" rx="0.4" fill="#d32f2f" opacity=".75"/><rect x="3.5" y="8.3" width="5.5" height="1.1" rx="0.4" fill="#bbb" opacity=".6"/><rect x="3.5" y="10.6" width="6.5" height="1.1" rx="0.4" fill="#bbb" opacity=".5"/></svg>`;
}
function totalDocs(code) {
  const n=nodes[code]; let t=n.docs.length;
  n.children.forEach(c => t+=totalDocs(c)); return t;
}

// \u2500\u2500\u2500 RENDER TREE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function renderNode(code, depth) {
  const n = nodes[code];
  const hasAny = n.children.length>0 || n.docs.length>0;
  const wrap = document.createElement('div'); wrap.className='node-wrap'; wrap.dataset.code=code;
  const hdr = document.createElement('div');
  hdr.className='node-header'+(n.isVirtual?' virtual-node':''); hdr.dataset.code=code;
  hdr.style.setProperty('--depth',depth);
  const toggle = document.createElement('div');
  toggle.className=hasAny?'toggle-btn':'toggle-btn spacer'; toggle.textContent=hasAny?'\u25b6':'';
  const icon = document.createElement('span'); icon.innerHTML=folderSVG(n.isVirtual);
  const codeEl = document.createElement('span'); codeEl.className='node-code'; codeEl.textContent=code;
  const labelEl = document.createElement('span'); labelEl.className='node-label';
  if(!n.isVirtual && n.docs.length>0) {
    const discs=[...new Set(n.docs.map(i=>DATA[i]['Disciplina']).filter(Boolean))];
    labelEl.textContent=discs[0]||WBS_LABELS[code]||'';
    labelEl.title=WBS_LABELS[code]||'';
  } else { labelEl.textContent=n.label; labelEl.title=n.label; }
  const badge=document.createElement('span');
  badge.className='badge'+(n.isVirtual?' vbadge':''); badge.textContent=totalDocs(code);
  hdr.append(toggle,icon,codeEl,labelEl,badge); wrap.appendChild(hdr);
  if(hasAny) {
    const childDiv=document.createElement('div'); childDiv.className='node-children';
    n.docs.forEach(idx => {
      const doc=DATA[idx];
      const item=document.createElement('div'); item.className='doc-item'; item.dataset.idx=idx;
      item.style.setProperty('--depth',depth+1);
      const di=document.createElement('span'); di.innerHTML=docSVG();
      const dt=document.createElement('span'); dt.className='doc-title';
      dt.textContent=doc['Nombre Original']; dt.title=doc['T\u00edtulo']||doc['Nombre Original'];
      item.append(di,dt);
      item.addEventListener('click',e=>{ e.stopPropagation(); selectDoc(idx,item); });
      childDiv.appendChild(item);
    });
    n.children.forEach(c=>childDiv.appendChild(renderNode(c,depth+1)));
    wrap.appendChild(childDiv);
    hdr.addEventListener('click',()=>{
      const open=childDiv.classList.toggle('open');
      toggle.textContent=open?'\u25bc':'\u25b6';
    });
  }
  return wrap;
}
function renderFullTree() {
  const t=document.getElementById('tree'); t.innerHTML='';
  roots.forEach(r=>t.appendChild(renderNode(r,0)));
}

// \u2500\u2500\u2500 DETAIL \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
let selEl=null;
function selectDoc(idx,el) {
  document.querySelectorAll('.doc-item.selected,.node-header.selected').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected'); selEl=el; showDetail(idx);
}

function fv(val) {
  if(!val||val==='\u2014'||val==='Pendiente') return `<span class="field-value empty">${val||'\u2014'}</span>`;
  return `<span class="field-value">${val}</span>`;
}

function showDetail(idx) {
  const doc = DATA[idx];
  const wbs = doc['C\u00f3digo WBS'];
  const wbsLabel = WBS_LABELS[wbs]||wbs;
  const estado = doc['Estado']||'';
  const sc = estado.toLowerCase().includes('oficial')?'st-oficial':
             estado.toLowerCase().includes('aprobado')?'st-aprobado':
             estado.toLowerCase().includes('referencial')?'st-referencial':'st-default';
  const thumb = makeThumbnail(doc);

  document.getElementById('detail').innerHTML = `
    <div class="detail-card">

}

// \u2500\u2500\u2500 SEARCH \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function doSearch() {
  const q=document.getElementById('search').value.toLowerCase().trim();
  if(!q) {
    document.querySelectorAll('.node-wrap').forEach(el=>el.style.display='');
    document.querySelectorAll('.doc-item').forEach(el=>el.style.display='');
    document.getElementById('result-count').textContent=''; return;
  }
  const matchDocs=new Set();
  DATA.forEach((doc,idx)=>{ if(Object.values(doc).join(' ').toLowerCase().includes(q)) matchDocs.add(idx); });
  document.querySelectorAll('.doc-item').forEach(el=>{
    el.style.display=matchDocs.has(parseInt(el.dataset.idx))?'':'none';
  });
  function hasMatch(code) {
    const n=nodes[code];
    if(n.docs.some(i=>matchDocs.has(i))) return true;
    return n.children.some(c=>hasMatch(c));
  }
  function applyNode(wrap) {
    const code=wrap.dataset.code;
    const cDiv=wrap.querySelector(':scope > .node-children');
    const btn=wrap.querySelector(':scope > .node-header > .toggle-btn');
    const hm=hasMatch(code);
    wrap.style.display=hm?'':'none';
    if(hm&&cDiv){cDiv.classList.add('open'); if(btn&&!btn.classList.contains('spacer'))btn.textContent='\u25bc';}
    cDiv&&cDiv.querySelectorAll(':scope > .node-wrap').forEach(applyNode);
  }
  document.querySelectorAll('#tree > .node-wrap').forEach(applyNode);
  document.getElementById('result-count').textContent=`${matchDocs.size} documento(s)`;
}
function clearSearch(){document.getElementById('search').value='';doSearch();}
function expandAll(){document.querySelectorAll('.node-children').forEach(c=>c.classList.add('open'));document.querySelectorAll('.toggle-btn:not(.spacer)').forEach(b=>b.textContent='\u25bc');}
function collapseAll(){document.querySelectorAll('.node-children').forEach(c=>c.classList.remove('open'));document.querySelectorAll('.toggle-btn:not(.spacer)').forEach(b=>b.textContent='\u25b6');}
document.getElementById('search').addEventListener('input',doSearch);

// \u2500\u2500\u2500 SPLITTER \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
const splitter=document.getElementById('splitter'), treePanel=document.getElementById('treePanel');
let dragging=false;
splitter.addEventListener('mousedown',e=>{dragging=true;splitter.classList.add('dragging');e.preventDefault();});
document.addEventListener('mousemove',e=>{if(!dragging)return;const r=document.querySelector('.main').getBoundingClientRect();treePanel.style.width=Math.max(180,Math.min(e.clientX-r.left,r.width*.72))+'px';});
document.addEventListener('mouseup',()=>{dragging=false;splitter.classList.remove('dragging');});

// \u2500\u2500\u2500 INIT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
renderFullTree();
document.getElementById('hdr-info').textContent=`${Object.keys(nodes).length} nodos WBS \u00b7 ${DATA.length} documentos`;
</script>
